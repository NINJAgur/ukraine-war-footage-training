[pytest]
testpaths = tests
python_files = test_*.py
markers =
    unit: pure function tests, no external deps
    integration: requires postgres DB
    network: requires internet access
    smoke: quick health checks
    gpu: requires GPU and model weights
    slow: takes more than 30s
addopts = -v --tb=short -m "not gpu and not slow and not network and not integration"
