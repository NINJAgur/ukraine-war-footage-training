# docker-compose.override.yml — Local Docker Desktop development
#
# Automatically merged by `docker compose up`. Appends bind-mounts and env
# overrides so containers use local disk data and the host Postgres instance
# (which holds real clips, training runs, and annotated media).
#
# host.docker.internal resolves to the host machine from inside a container.
#
# ml-worker bind-mounts only apply when running with --profile gpu:
#   docker compose --profile gpu up --build
#
# On a fresh machine without local data, delete this file and run:
#   docker compose --profile gpu run --rm ml-worker bash scripts/setup_datasets.sh

services:

  scraper-worker:
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:postgres@host.docker.internal:5432/ukraine_footage
    volumes:
      - ./scraper-engine/media:/app/scraper-engine/media

  ml-worker:
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:postgres@host.docker.internal:5432/ukraine_footage
    volumes:
      - ./scraper-engine/media:/app/scraper-engine/media:ro
      - ./ml-engine/media:/app/ml-engine/media
      - ./ml-engine/runs:/app/ml-engine/runs

  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/ukraine_footage
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/ukraine_footage
    volumes:
      - ./ml-engine/media:/app/ml-engine/media:ro
