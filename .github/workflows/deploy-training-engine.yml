name: Deploy to training-engine

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TRAINING_ENGINE_HOST }}
          username: ubuntu
          key: ${{ secrets.TRAINING_ENGINE_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo git pull
            sudo systemctl restart celery-training
