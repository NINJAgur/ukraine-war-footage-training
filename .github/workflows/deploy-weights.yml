name: Upload weights to GCS

on:
  workflow_dispatch:
    inputs:
      t4_host:
        description: "T4 VM external IP"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Upload weights via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.t4_host }}
          username: ubuntu
          key: ${{ secrets.T4_SSH_KEY }}
          script: |
            source /home/ubuntu/app/ml-engine/venv/bin/activate
            python3 /home/ubuntu/app/infra/gcp/upload_weights.py \
              ukraine-footage-media /home/ubuntu/app
