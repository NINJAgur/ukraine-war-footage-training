name: Upload weights to GCS

on:
  workflow_call:
    inputs:
      t4_host:
        description: "training-engine VM external IP"
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Upload weights via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.t4_host }}
          username: ubuntu
          key: ${{ secrets.TRAINING_ENGINE_SSH_KEY }}
          script: |
            source /home/ubuntu/app/training-engine/venv/bin/activate
            python3 /home/ubuntu/app/infra/gcp/upload_weights.py \
              ukraine-footage-media /home/ubuntu/app
