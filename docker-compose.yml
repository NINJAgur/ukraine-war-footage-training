# docker-compose.yml — Local Docker Desktop (Windows dev)
#
# ML inference runs NATIVELY on Windows — see inference-engine/tasks/annotate_clips.py
# For GCP production deployment see docker-compose.prod.yml
#
# Usage:
#   docker compose up --build
#   docker compose down

services:

  # ── Infrastructure ────────────────────────────────────────────────────

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ukraine_footage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ukraine_footage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Scraper Engine ────────────────────────────────────────────────────

  scraper-worker:
    container_name: scraper-worker
    build:
      context: .
      dockerfile: scraper-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A celery_app worker -Q default --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./scraper-engine/media:/app/scraper-engine/media

  scraper-beat:
    container_name: scraper-beat
    build:
      context: .
      dockerfile: scraper-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - scraper-worker

  # ── Web Application ───────────────────────────────────────────────────

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: web-app/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://frontend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./inference-engine/media:/app/inference-engine/media:ro

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: web-app/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./web-app/frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./inference-engine/media:/app/inference-engine/media:ro

volumes:
  postgres_data:
  redis_data:
