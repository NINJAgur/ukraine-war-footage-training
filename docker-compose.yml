# docker-compose.yml — Ukraine Combat Footage Web Application
#
# ml-worker and ml-beat require GPU (NVIDIA Container Toolkit).
# They are gated behind the "gpu" profile — omitted from the default smoke test.
#
# Default (no GPU):   docker compose up --build
# Full stack w/ GPU:  docker compose --profile gpu up --build
#
# First-time setup:
#   cp .env.example .env   # fill in secrets

services:

  # ── Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ukraine_footage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ukraine_footage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Scraper Engine ────────────────────────────────────────────────────

  scraper-worker:
    build:
      context: .
      dockerfile: scraper-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A celery_app worker -Q default --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - scraper_media:/app/scraper-engine/media

  scraper-beat:
    build:
      context: .
      dockerfile: scraper-engine/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - scraper-worker

  # ── ML Engine ─────────────────────────────────────────────────────────

  ml-worker:
    profiles: [gpu]
    build:
      context: .
      dockerfile: ml-engine/Dockerfile
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      GDINO_CHECKPOINT: /checkpoints/groundingdino_swint_ogc.pth
      YOLO_MODEL: /checkpoints/yolov8m.pt
      CHECKPOINTS_DIR: /checkpoints
      KAGGLE_CACHE: /app/ml-engine/media/kaggle_datasets
      KAGGLEHUB_CACHE: /app/ml-engine/media/kaggle_datasets
      STORAGE_MODE: ${STORAGE_MODE:-local}
      REMOTE_STORAGE_BUCKET: ${REMOTE_STORAGE_BUCKET:-ukraine-footage-bucket}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file: .env
    command: celery -A celery_app worker -Q gpu --loglevel=info --concurrency=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - scraper_media:/app/scraper-engine/media:ro
      - ml_media:/app/ml-engine/media
      - ml_runs:/app/ml-engine/runs
      - ml_checkpoints:/checkpoints

  ml-beat:
    profiles: [gpu]
    build:
      context: .
      dockerfile: ml-engine/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_SYNC_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CHECKPOINTS_DIR: /checkpoints
    env_file: .env
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - ml-worker
    volumes:
      - ml_checkpoints:/checkpoints

  # ── Web Application ───────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: web-app/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ukraine_footage
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://frontend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml_media:/app/ml-engine/media:ro

  frontend:
    build:
      context: .
      dockerfile: web-app/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  scraper_media:     # funker530/ geoconfirmed/ — scraper-worker writes, ml-worker reads
  ml_media:          # annotated/ scraped_datasets/ — ml-worker writes, backend reads
  ml_runs:           # training runs and best.pt weights — persisted across restarts
  ml_checkpoints:    # GDINO + YOLO base weights — downloaded once by entrypoint.sh
